# Shopify Theme App Extension Configuration
# This extension injects labels onto product pages

name = "Product Label Injector"
description = "Injects customizable labels onto Shopify product pages"

[webhooks]
api_version = "2024-01"

[settings]
  [[settings.theme_extensions]]
  name = "Product Label"
  handle = "product-label"
  target = "section"

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopify Label Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 40px;
        }

        .form-section {
            border-right: 2px solid #f0f0f0;
            padding-right: 30px;
        }

        .labels-section {
            padding-left: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        input[type="text"],
        input[type="color"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="color"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="color"] {
            height: 50px;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .section-title {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .labels-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .label-item {
            background: #f9f9f9;
            border-left: 4px solid;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .label-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .label-item.selected {
            background: #e8e8ff;
            border-left-width: 8px;
        }

        .label-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .label-details {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .label-color-preview {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 2px solid #ccc;
            margin-right: 8px;
            vertical-align: middle;
        }

        .label-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-small {
            flex: 1;
            padding: 8px 12px;
            font-size: 0.85em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-edit {
            background: #667eea;
            color: white;
        }

        .btn-edit:hover {
            background: #5a68d8;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
        }

        .btn-delete:hover {
            background: #ee5a52;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease-in-out;
        }

        .success-message.show {
            display: block;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease-in-out;
        }

        .error-message.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .position-preview {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .position-btn {
            flex: 1;
            padding: 8px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
        }

        .position-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .position-btn:hover {
            border-color: #667eea;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .form-section {
                border-right: none;
                border-bottom: 2px solid #f0f0f0;
                padding-right: 0;
                padding-bottom: 20px;
            }

            .labels-section {
                padding-left: 0;
                padding-top: 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .button-group {
                flex-direction: column;
            }
        }

        .stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Label Manager</h1>
            <p>Create and manage product labels for your Shopify store</p>
        </div>

        <div class="content">
            <div class="form-section">
                <h2 class="section-title">Create Label</h2>

                <div id="successMessage" class="success-message"></div>
                <div id="errorMessage" class="error-message"></div>

                <form id="labelForm">
                    <div class="form-group">
                        <label for="labelName">Label Name *</label>
                        <input
                            type="text"
                            id="labelName"
                            placeholder="e.g., New, Sale, Limited"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="labelText">Label Text *</label>
                        <input
                            type="text"
                            id="labelText"
                            placeholder="e.g., NEW ITEM"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="labelColor">Label Color *</label>
                        <input
                            type="color"
                            id="labelColor"
                            value="#667eea"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label>Label Position *</label>
                        <div class="position-preview">
                            <button type="button" class="position-btn active" data-position="top-left">↖ Top Left</button>
                            <button type="button" class="position-btn" data-position="top-right">↗ Top Right</button>
                        </div>
                        <div class="position-preview">
                            <button type="button" class="position-btn" data-position="bottom-left">↙ Bottom Left</button>
                            <button type="button" class="position-btn" data-position="bottom-right">↘ Bottom Right</button>
                        </div>
                        <input type="hidden" id="labelPosition" value="top-left" required>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-primary">Create Label</button>
                        <button type="reset" class="btn-secondary">Clear</button>
                    </div>
                </form>
            </div>

            <div class="labels-section">
                <h2 class="section-title">Your Labels</h2>

                <div id="labelsList" class="labels-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>No labels created yet.</p>
                        <p>Create your first label to get started!</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="stats">
            <strong>Total Labels:</strong> <span id="labelCount">0</span> |
            <strong>Status:</strong> <span id="status">Ready</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
